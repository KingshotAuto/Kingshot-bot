name: Release

# Cut a downloadable release in one of two ways:
#   1. Push a version tag:   git tag v0.1.0 && git push origin v0.1.0
#   2. Actions tab -> Release -> "Run workflow" -> enter a version (e.g. 0.1.0)
#
# Use 3-part numeric versions (e.g. 0.1.0) - they are baked into the
# assembly/file version and the installer, which require numeric values.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        shell: bash
        env:
          # Pass untrusted inputs through env so they are never templated into the script body.
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          # Reject anything that is not a strict numeric x.y.z (also prevents broken assembly versions).
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$VERSION' - use numeric x.y.z, e.g. 0.1.0" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Install NSIS (for the Windows installer)
        run: choco install nsis -y --no-progress

      - name: Build release package
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: ./Build.ps1 -Version $env:RELEASE_VERSION

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          ZIP="dist/KingshotAuto-v${RELEASE_VERSION}-win-x64.zip"
          SETUP="dist/Installers/KingshotAuto-Setup-v${RELEASE_VERSION}.exe"
          FILES=( "$ZIP" )
          [ -f "$SETUP" ] && FILES+=( "$SETUP" )
          echo "Attaching: ${FILES[*]}"
          NOTES=$(printf 'Automated build of KingshotAuto.\n\n**Downloads**\n- `KingshotAuto-v%s-win-x64.zip` - portable, self-contained (no .NET install needed). Extract and run `KingshotAuto.exe` **as Administrator**.\n- `KingshotAuto-Setup-v%s.exe` - Windows installer (shortcuts + VC++ runtime).\n\nRequires LDPlayer 9 to actually drive the game. This is early software - not every task works yet. See the README and please report issues.' "$RELEASE_VERSION" "$RELEASE_VERSION")
          gh release create "$RELEASE_TAG" "${FILES[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "KingshotAuto $RELEASE_TAG" \
            --notes "$NOTES"
